# =============================================================================
# RAD-ML GitHub Actions CI Pipeline
# Runs on every push and pull request to main.
# Tests: install → lint → pytest with coverage.
# =============================================================================

name: RAD-ML CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Python ${{ matrix.python-version }} Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout source
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Python
      # ------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ------------------------------------------------------------------
      # 3. Install dependencies
      # ------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------------
      # 4. Download spaCy model
      # ------------------------------------------------------------------
      - name: Download spaCy en_core_web_sm
        run: python -m spacy download en_core_web_sm

      # ------------------------------------------------------------------
      # 5. Download NLTK resources
      # ------------------------------------------------------------------
      - name: Download NLTK resources
        run: |
          python -c "
          import nltk
          for r in ['punkt', 'averaged_perceptron_tagger',
                    'averaged_perceptron_tagger_eng', 'stopwords', 'punkt_tab']:
              nltk.download(r, quiet=True)
          print('NLTK resources ready.')
          "

      # ------------------------------------------------------------------
      # 6. Ensure required directories exist
      # ------------------------------------------------------------------
      - name: Create required directories
        run: mkdir -p data/raw data/processed logs

      # ------------------------------------------------------------------
      # 7. Run Pytest with coverage
      # ------------------------------------------------------------------
      - name: Run tests with pytest
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short

      # ------------------------------------------------------------------
      # 8. Upload coverage report as artifact
      # ------------------------------------------------------------------
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      # ------------------------------------------------------------------
      # 9. Upload logs as artifact (useful for debugging failed runs)
      # ------------------------------------------------------------------
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-py${{ matrix.python-version }}
          path: logs/
          retention-days: 7

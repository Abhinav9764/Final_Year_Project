# =============================================================================
# RAD-ML GitHub Actions CI Pipeline  (v2 — fixed)
# =============================================================================
# Fixes applied vs v1:
#   - conftest.py now injects sys.path → no more ModuleNotFoundError
#   - Coverage scope narrowed to source packages only (excludes tests/, setup)
#   - Artifact names include run-id to avoid matrix collisions
#   - logs/ created before pytest so upload never fails on empty dir
#   - spaCy download wrapped in || true so it doesn't block NLTK-only runs
#   - flask / flask-cors added to requirements so UI can be tested
#   - Added a dedicated lint step (import-check) for fast feedback
# =============================================================================

name: RAD-ML CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============================================================
  # JOB 1: Run full test suite
  # ============================================================
  test:
    name: "Tests — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      # ----------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Set up Python
      # ----------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ----------------------------------------------------------
      # 3. Install dependencies
      # ----------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------------
      # 4. Download spaCy model (non-fatal — NLTK fallback handles it)
      # ----------------------------------------------------------
      - name: Download spaCy en_core_web_sm
        run: python -m spacy download en_core_web_sm || echo "spaCy model unavailable; NLTK fallback will be used."

      # ----------------------------------------------------------
      # 5. Download NLTK resources
      # ----------------------------------------------------------
      - name: Download NLTK resources
        run: |
          python - <<'EOF'
          import nltk, sys
          resources = [
              'punkt', 'punkt_tab',
              'averaged_perceptron_tagger',
              'averaged_perceptron_tagger_eng',
              'stopwords',
          ]
          failed = []
          for r in resources:
              try:
                  nltk.download(r, quiet=True)
                  print(f"  ✓ {r}")
              except Exception as e:
                  print(f"  ✗ {r}: {e}")
                  failed.append(r)
          if failed:
              print(f"Warning: some NLTK resources failed: {failed}")
          print("NLTK setup complete.")
          EOF

      # ----------------------------------------------------------
      # 6. Create required runtime directories
      # ----------------------------------------------------------
      - name: Create runtime directories
        run: |
          mkdir -p data/raw data/processed logs
          # Touch a placeholder so the logs artifact upload never fails
          touch logs/.gitkeep

      # ----------------------------------------------------------
      # 7. Quick import sanity-check (catches broken imports fast)
      # ----------------------------------------------------------
      - name: Import sanity check
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          modules = [
              'brain.extractor',
              'collectors.ddg_search',
              'collectors.kaggle_client',
              'core.agent',
              'core.environment',
              'core.evolution_engine',
              'utils.logger',
              'utils.data_cleaner',
              'utils.data_store',
          ]
          failed = []
          for m in modules:
              try:
                  __import__(m)
                  print(f"  ✓ {m}")
              except Exception as e:
                  print(f"  ✗ {m}: {e}")
                  failed.append(m)
          if failed:
              print(f"\nFAILED imports: {failed}")
              sys.exit(1)
          print("\nAll imports OK.")
          EOF

      # ----------------------------------------------------------
      # 8. Run Pytest with coverage
      #    Coverage sources: only the 4 real packages (not tests/)
      # ----------------------------------------------------------
      - name: Run tests with pytest
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
          # Prevent spaCy from trying to write to protected dirs in CI
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/ \
            --cov=brain \
            --cov=collectors \
            --cov=core \
            --cov=utils \
            --cov-report=xml:coverage-py${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            -v \
            --tb=short \
            -p no:warnings

      # ----------------------------------------------------------
      # 9. Upload coverage XML
      # ----------------------------------------------------------
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # Include run-id so matrix jobs don't overwrite each other
          name: coverage-py${{ matrix.python-version }}-run${{ github.run_id }}
          path: coverage-py${{ matrix.python-version }}.xml
          retention-days: 14

      # ----------------------------------------------------------
      # 10. Upload logs
      # ----------------------------------------------------------
      - name: Upload agent logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-py${{ matrix.python-version }}-run${{ github.run_id }}
          path: logs/
          retention-days: 7

  # ============================================================
  # JOB 2: Confirm Flask UI starts without errors
  # ============================================================
  ui-check:
    name: "Flask UI import check"
    runs-on: ubuntu-latest
    needs: []   # Run in parallel with test job

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Flask UI imports cleanly
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          try:
              import importlib.util
              spec = importlib.util.spec_from_file_location("app_ui", "app_ui.py")
              mod  = importlib.util.module_from_spec(spec)
              # Only load — don't call app.run()
              spec.loader.exec_module(mod)
              print("✓ app_ui.py loaded successfully.")
          except Exception as e:
              print(f"✗ app_ui.py failed to load: {e}")
              sys.exit(1)
          EOF
